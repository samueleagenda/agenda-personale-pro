<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Personale Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--primary:#2563eb;--primary-dark:#1d4ed8;--text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--danger:#ef4444;--sidebar-w:220px;}
.dark{--bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--text-muted:#94a3b8;--border:#334155;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-card{background:var(--surface);border-radius:16px;padding:40px;border:1px solid var(--border);width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.login-card h2{font-size:1.4rem;margin-bottom:8px;color:var(--primary);}
.login-card p{color:var(--text-muted);font-size:0.85rem;margin-bottom:24px;}
.login-card .fg{margin-bottom:16px;display:flex;flex-direction:column;gap:6px;}
.login-card label{font-size:0.82rem;color:var(--text-muted);font-weight:500;}
.login-card input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;}
.login-error{color:var(--danger);font-size:0.82rem;margin-top:12px;text-align:center;min-height:20px;}
#sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#logo{padding:20px 16px;font-size:1.1rem;font-weight:700;color:var(--primary);cursor:pointer;border-bottom:1px solid var(--border);}
#logo span{font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400;margin-top:2px;}
nav{flex:1;padding:12px 8px;}
nav button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;background:none;color:var(--text);cursor:pointer;border-radius:8px;font-size:0.9rem;text-align:left;margin-bottom:2px;transition:background 0.15s;}
nav button:hover{background:var(--bg);}
nav button.active{background:var(--primary);color:white;}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);}
.sidebar-footer button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;background:none;color:var(--text-muted);cursor:pointer;border-radius:8px;font-size:0.85rem;}
.sidebar-footer button:hover{background:var(--bg);color:var(--text);}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
#topbar h2{font-size:1.1rem;font-weight:600;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:500;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-danger{background:var(--danger);color:white;}
.btn-sm{padding:5px 10px;font-size:0.78rem;}
#content{flex:1;overflow-y:auto;padding:24px;}
.section{display:none;}
.section.active{display:block;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);}
.stat-card .label{font-size:0.8rem;color:var(--text-muted);margin-bottom:8px;}
.stat-card .value{font-size:1.8rem;font-weight:700;color:var(--primary);}
.upcoming-list{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.upcoming-item{background:var(--surface);border-radius:10px;padding:14px;border:1px solid var(--border);border-left:4px solid var(--primary);cursor:pointer;}
.upcoming-item:hover{background:var(--bg);}
.upcoming-item h4{font-size:0.9rem;font-weight:600;margin-bottom:4px;}
.upcoming-item p{font-size:0.8rem;color:var(--text-muted);}
.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.filters input,.filters select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:0.85rem;}
.appt-list{display:flex;flex-direction:column;gap:10px;}
.appt-card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.appt-card .info h4{font-size:0.95rem;font-weight:600;margin-bottom:4px;}
.appt-card .info p{font-size:0.82rem;color:var(--text-muted);margin-bottom:2px;}
.appt-card .actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.75rem;font-weight:500;margin-right:4px;}
.badge-confermato{background:#dcfce7;color:#166534;}
.badge-da_confermare{background:#fef9c3;color:#854d0e;}
.badge-annullato{background:#fee2e2;color:#991b1b;}
.badge-completato{background:#dbeafe;color:#1e40af;}
.form-wrap{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:0.82rem;color:var(--text-muted);font-weight:500;}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;}
.form-group textarea{resize:vertical;min-height:80px;}
.form-actions{margin-top:20px;display:flex;gap:10px;}
.detail-card{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);max-width:700px;}
.detail-card h3{font-size:1.2rem;margin-bottom:20px;color:var(--primary);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.detail-item .dl{font-size:0.78rem;color:var(--text-muted);font-weight:500;text-transform:uppercase;margin-bottom:4px;}
.detail-item .dv{font-size:0.95rem;}
.detail-actions{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap;}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.client-card{background:var(--surface);border-radius:10px;padding:18px;border:1px solid var(--border);}
.client-card h4{font-size:0.95rem;font-weight:600;margin-bottom:6px;}
.client-card p{font-size:0.82rem;color:var(--text-muted);margin-bottom:4px;}
.client-card .actions{margin-top:12px;display:flex;gap:6px;}
.client-detail-header{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);margin-bottom:20px;}
.client-detail-header h2{font-size:1.3rem;margin-bottom:16px;}
.client-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px;}
.cal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.cal-header h3{flex:1;font-size:1rem;font-weight:600;}
.cal-views{display:flex;gap:6px;margin-bottom:16px;}
.cal-views button{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:0.82rem;}
.cal-views button.active{background:var(--primary);color:white;border-color:var(--primary);}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.month-day-header{background:var(--primary);color:white;padding:8px 4px;text-align:center;font-size:0.78rem;font-weight:600;}
.month-day{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:80px;padding:4px;cursor:pointer;background:var(--surface);}
.month-day:hover{background:var(--bg);}
.month-day .day-num{font-size:0.82rem;font-weight:600;margin-bottom:4px;}
.month-day.today .day-num{background:var(--primary);color:white;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.month-day.other-month{opacity:0.4;}
.month-event{background:var(--primary);color:white;border-radius:3px;padding:1px 4px;font-size:0.68rem;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.week-grid{display:grid;grid-template-columns:60px repeat(7,1fr);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.week-header{background:var(--primary);color:white;padding:8px 4px;text-align:center;font-size:0.78rem;font-weight:600;}
.week-time{background:var(--bg);padding:4px;text-align:right;font-size:0.72rem;color:var(--text-muted);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.week-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:32px;padding:2px;background:var(--surface);}
.week-event{background:var(--primary);color:white;border-radius:4px;padding:2px 4px;font-size:0.7rem;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.day-list{display:flex;flex-direction:column;gap:10px;}
.day-event{background:var(--surface);border-left:4px solid var(--primary);border-radius:8px;padding:14px;border:1px solid var(--border);cursor:pointer;}
.day-event:hover{background:var(--bg);}
.empty{text-align:center;padding:40px;color:var(--text-muted);background:var(--surface);border-radius:12px;border:1px solid var(--border);}
.loading{text-align:center;padding:40px;color:var(--text-muted);}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:white;padding:12px 20px;border-radius:10px;font-size:0.85rem;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
@media(max-width:768px){#sidebar{width:60px;}#logo span,nav button span{display:none;}nav button{justify-content:center;padding:10px;}.form-grid{grid-template-columns:1fr;}.detail-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class
